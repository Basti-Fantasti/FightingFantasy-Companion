<div class="modal is-active">
  <div class="modal-background" onclick="document.dispatchEvent(new CustomEvent('close-modal'))"></div>
  <div class="modal-card">
    <header class="modal-card-head"><p class="modal-card-title">{{:label}}</p></header>
    <section class="modal-card-body has-text-centered">
      <div class="buttons is-centered">
        <button class="button is-large is-touch ff-numeric"
                hx-post="{{:preview_url}}" hx-target="#modal-host"
                hx-vals='{"item_name":"{{:item_name}}","original":"{{:original}}","working":"{{:working}}","delta":"-5","reason":"{{:reason}}"}'>&minus;5</button>
        <button class="button is-large is-touch ff-numeric"
                hx-post="{{:preview_url}}" hx-target="#modal-host"
                hx-vals='{"item_name":"{{:item_name}}","original":"{{:original}}","working":"{{:working}}","delta":"-1","reason":"{{:reason}}"}'>&minus;1</button>
      </div>
      <input class="input is-large has-text-centered ff-numeric" type="number" inputmode="numeric" pattern="[0-9]*" value="{{:working}}"
             hx-post="{{:preview_url}}" hx-trigger="change" hx-target="#modal-host"
             hx-vals='{"item_name":"{{:item_name}}","original":"{{:original}}","delta":"0","reason":"{{:reason}}"}' name="working">
      <p class="has-text-grey is-size-7 ff-numeric">was {{:original}} &bull; Δ {{:delta_display}}</p>
      <div class="buttons is-centered">
        <button class="button is-large is-touch ff-numeric"
                hx-post="{{:preview_url}}" hx-target="#modal-host"
                hx-vals='{"item_name":"{{:item_name}}","original":"{{:original}}","working":"{{:working}}","delta":"+1","reason":"{{:reason}}"}'>+1</button>
        <button class="button is-large is-touch ff-numeric"
                hx-post="{{:preview_url}}" hx-target="#modal-host"
                hx-vals='{"item_name":"{{:item_name}}","original":"{{:original}}","working":"{{:working}}","delta":"+5","reason":"{{:reason}}"}'>+5</button>
      </div>
      <div class="field mt-3">
        <label class="label">{{:l10n.lbl_reason}}</label>
        <input class="input" name="reason" value="{{:reason}}">
      </div>
    </section>
    <footer class="modal-card-foot">
      <button class="button is-light" onclick="document.dispatchEvent(new CustomEvent('close-modal'))">{{:l10n.btn_cancel}}</button>
      <form hx-post="{{:commit_url}}" hx-target="#inventory-panel" hx-swap="outerHTML">
        <input type="hidden" name="kind" value="modify">
        <input type="hidden" name="item_name" value="{{:item_name}}">
        <input type="hidden" name="quantity" value="{{:working}}">
        <input type="hidden" name="note" value="{{:reason}}">
        <input type="hidden" name="last_step_id" value="{{:last_step_id}}">
        <button class="button is-primary">{{:l10n.btn_confirm}}</button>
      </form>
    </footer>
  </div>
</div>
