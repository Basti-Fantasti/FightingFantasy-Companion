services:
  ffcompanion:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ghcr.io/basti-fantasti/fightingfantasy-companion:${IMAGE_TAG}
    container_name: ffcompanion
    restart: unless-stopped
    ports:
      - "8099:8080"
    environment:
      TZ: Europe/Berlin
      DEFAULT_LANGUAGE: de
      HTTP_PORT: 8080
      DATABASE_PATH: /app/data/ffcompanion.db
      SEED_YAML_PATH: /app/seed/books_seed.yaml
    volumes:
      - ffcompanion-data:/app/data

volumes:
  ffcompanion-data:
