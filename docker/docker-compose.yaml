services:
  ffcompanion:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ffcompanion:latest
    container_name: ffcompanion
    restart: unless-stopped
    ports:
      - "8099:8080"
    environment:
      TZ: Europe/Berlin
      DEFAULT_LANGUAGE: de
      HTTP_PORT: 8080
      DATABASE_PATH: /app/data/ffcompanion.db
      SEED_YAML_PATH: /app/seed/books_seed.yaml
    volumes:
      - ./data:/app/data
